<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neuron Simulation</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #080c10;
            --bg2: #0d1117;
            --bg3: #131920;
            --border: rgba(0, 200, 150, 0.15);
            --accent: #00c896;
            --accent2: #ff6b35;
            --text: #c8d8d0;
            --text-muted: #4a6060;
            --source: #3b9eff;
            --target: #ff6b35;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
            min-height: 100vh;
            overflow-x: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image:
                linear-gradient(rgba(0,200,150,0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0,200,150,0.03) 1px, transparent 1px);
            background-size: 40px 40px;
            pointer-events: none;
            z-index: 0;
        }

        header {
            padding: 24px 32px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: baseline;
            gap: 16px;
            position: relative;
            z-index: 1;
        }

        header h1 {
            font-family: 'Space Mono', monospace;
            font-size: 18px;
            font-weight: 700;
            color: var(--accent);
            letter-spacing: -0.5px;
        }

        header span {
            font-size: 12px;
            color: var(--text-muted);
            font-family: 'Space Mono', monospace;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--accent);
            margin-left: auto;
            box-shadow: 0 0 8px var(--accent);
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }

        .layout {
            display: grid;
            grid-template-columns: 260px 1fr;
            grid-template-rows: auto 1fr;
            gap: 0;
            height: calc(100vh - 65px);
            position: relative;
            z-index: 1;
        }

        .controls {
            grid-row: 1 / 3;
            border-right: 1px solid var(--border);
            padding: 24px 20px;
            display: flex;
            flex-direction: column;
            gap: 24px;
            overflow-y: auto;
        }

        .controls-title {
            font-family: 'Space Mono', monospace;
            font-size: 10px;
            color: var(--text-muted);
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .control-group { display: flex; flex-direction: column; gap: 16px; }
        .control-item { display: flex; flex-direction: column; gap: 8px; }

        .control-item label {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 12px;
            color: var(--text-muted);
            font-family: 'Space Mono', monospace;
        }

        .control-item label span { color: var(--accent); font-weight: 700; }

        input[type="range"] {
            -webkit-appearance: none;
            width: 100%;
            height: 2px;
            background: var(--bg3);
            border-radius: 2px;
            outline: none;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background: var(--accent);
            cursor: pointer;
            box-shadow: 0 0 8px rgba(0, 200, 150, 0.5);
            transition: transform 0.15s;
        }

        input[type="range"]::-webkit-slider-thumb:hover { transform: scale(1.3); }

        .divider { height: 1px; background: var(--border); }

        .run-btn {
            width: 100%;
            padding: 12px;
            background: transparent;
            border: 1px solid var(--accent);
            border-radius: 4px;
            color: var(--accent);
            font-family: 'Space Mono', monospace;
            font-size: 12px;
            letter-spacing: 2px;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.2s;
            position: relative;
            overflow: hidden;
        }

        .run-btn::before {
            content: '';
            position: absolute;
            inset: 0;
            background: var(--accent);
            transform: translateX(-100%);
            transition: transform 0.2s;
            z-index: -1;
        }

        .run-btn:hover { color: var(--bg); }
        .run-btn:hover::before { transform: translateX(0); }

        .run-btn.running {
            border-color: var(--accent2);
            color: var(--accent2);
            animation: blink 1s ease-in-out infinite;
        }

        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.6; } }

        .stats { display: flex; flex-direction: column; gap: 8px; margin-top: auto; }

        .stat {
            display: flex;
            justify-content: space-between;
            font-size: 11px;
            font-family: 'Space Mono', monospace;
            color: var(--text-muted);
        }

        .stat span:last-child { color: var(--text); }

        .network-panel {
            border-bottom: 1px solid var(--border);
            padding: 20px 24px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .panel-title {
            font-family: 'Space Mono', monospace;
            font-size: 10px;
            color: var(--text-muted);
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        #neuron-canvas {
            background: var(--bg2);
            border: 1px solid var(--border);
            border-radius: 6px;
            display: block;
            width: 100%;
            height: 180px;
        }

        .charts-panel {
            padding: 20px 24px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .charts-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .chart-wrapper {
            background: var(--bg2);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 10px 12px;
        }

        .chart-wrapper.source { border-left: 2px solid var(--source); }
        .chart-wrapper.target { border-left: 2px solid var(--target); }
        .chart-wrapper.raster { border-left: 2px solid var(--accent); }

        .chart-label {
            font-family: 'Space Mono', monospace;
            font-size: 9px;
            letter-spacing: 1px;
            text-transform: uppercase;
            margin-bottom: 6px;
        }

        .chart-wrapper.source .chart-label { color: var(--source); }
        .chart-wrapper.target .chart-label { color: var(--target); }
        .chart-wrapper.raster .chart-label { color: var(--accent); }

        .chart-wrapper canvas { max-height: 70px; }
        .chart-wrapper.raster canvas { max-height: 120px; }

        .progress-bar {
            height: 2px;
            background: var(--bg3);
            border-radius: 2px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: var(--accent);
            width: 0%;
            transition: width 0.05s linear;
            box-shadow: 0 0 8px var(--accent);
        }

        .timestamp {
            font-family: 'Space Mono', monospace;
            font-size: 10px;
            color: var(--text-muted);
            text-align: right;
        }

        .legend { display: flex; gap: 16px; align-items: center; }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 11px;
            color: var(--text-muted);
            font-family: 'Space Mono', monospace;
        }

        .legend-dot { width: 8px; height: 8px; border-radius: 50%; }
    </style>
</head>
<body>

<header>
    <h1>NEUROSIM</h1>
    <span>LIF Network Simulator v1.0</span>
    <div class="status-dot"></div>
</header>

<div class="layout">

    <aside class="controls">
        <p class="controls-title">Parameters</p>

        <div class="control-group">
            <div class="control-item">
                <label>Excitatory <span id="exc-val">3.0</span></label>
                <input type="range" id="excitatory" min="1" max="10" step="0.5" value="3">
            </div>
            <div class="control-item">
                <label>Inhibitory <span id="inh-val">1.0</span></label>
                <input type="range" id="inhibitory" min="0" max="5" step="0.5" value="1">
            </div>
            <div class="control-item">
                <label>Syn. weight <span id="w-val">5.0</span></label>
                <input type="range" id="weight" min="1" max="20" step="0.5" value="5">
            </div>
            <div class="control-item">
                <label>Connectivity <span id="p-val">0.5</span></label>
                <input type="range" id="p" min="0.1" max="1" step="0.1" value="0.5">
            </div>
            <div class="control-item">
                <label>Duration (ms) <span id="dur-val">200</span></label>
                <input type="range" id="duration" min="100" max="500" step="50" value="200">
            </div>
        </div>

        <div class="divider"></div>

        <button class="run-btn" id="runBtn">▶ Run Simulation</button>

        <div class="divider"></div>

        <div class="stats">
            <p class="controls-title">Last Run</p>
            <div class="stat"><span>Sources</span><span id="stat-sources">—</span></div>
            <div class="stat"><span>Targets</span><span id="stat-targets">—</span></div>
            <div class="stat"><span>Synapses</span><span id="stat-synapses">—</span></div>
            <div class="stat"><span>Total spikes</span><span id="stat-spikes">—</span></div>
        </div>
    </aside>

    <div class="network-panel">
        <div style="display:flex; justify-content:space-between; align-items:center;">
            <p class="panel-title">Network Activity</p>
            <div class="legend">
                <div class="legend-item"><div class="legend-dot" style="background:var(--source)"></div>Source</div>
                <div class="legend-item"><div class="legend-dot" style="background:var(--target)"></div>Target</div>
                <div class="legend-item"><div class="legend-dot" style="background:#ffcc00"></div>Firing</div>
            </div>
            <span class="timestamp" id="timestamp">t = —</span>
        </div>
        <canvas id="neuron-canvas"></canvas>
        <div class="progress-bar"><div class="progress-fill" id="progress"></div></div>
    </div>

    <div class="charts-panel">
        <p class="panel-title">Voltage Traces</p>
        <div class="charts-grid" id="charts-grid"></div>
    </div>

</div>

<script>
    // Slider live labels
    const sliders = [
        { id: 'excitatory', out: 'exc-val' },
        { id: 'inhibitory', out: 'inh-val' },
        { id: 'weight',     out: 'w-val' },
        { id: 'p',          out: 'p-val' },
        { id: 'duration',   out: 'dur-val' },
    ];
    sliders.forEach(({ id, out }) => {
        const el = document.getElementById(id);
        el.addEventListener('input', () => {
            document.getElementById(out).textContent = parseFloat(el.value).toFixed(1);
        });
    });

    // State
    let charts = [];
    let synapses = null;
    let voltageHistory = null;
    let spikeHistory = null;
    let currentEvtSource = null;

    function resetHistory() {
        synapses = null;
        voltageHistory = {
            sources: Array(5).fill(null).map(() => []),
            targets: Array(5).fill(null).map(() => [])
        };
        spikeHistory = {
            sources: Array(5).fill(null).map(() => []),
            targets: Array(5).fill(null).map(() => [])
        };
    }

    // Draw network diagram
    function drawNetwork(state, synapses) {
        const canvas = document.getElementById('neuron-canvas');
        const ctx = canvas.getContext('2d');
        const W = canvas.width, H = canvas.height;
        ctx.clearRect(0, 0, W, H);

        const srcX = W * 0.2;
        const trgX = W * 0.8;
        const spacing = H / 6;

        synapses.forEach(syn => {
            const sy = spacing * (syn.source + 1);
            const ty = spacing * (syn.target + 1);
            const isActive = state.sources[syn.source].fired;

            ctx.beginPath();
            ctx.moveTo(srcX + 16, sy);
            ctx.bezierCurveTo(srcX + 80, sy, trgX - 80, ty, trgX - 16, ty);
            ctx.strokeStyle = isActive ? '#ffcc00' : 'rgba(0,200,150,0.08)';
            ctx.lineWidth = isActive ? 1.5 : 0.5;
            ctx.stroke();

            if (isActive) {
                ctx.beginPath();
                ctx.arc((srcX + trgX) / 2, (sy + ty) / 2, 3, 0, Math.PI * 2);
                ctx.fillStyle = '#ffcc00';
                ctx.fill();
            }
        });

        const drawNeuron = (x, y, voltage, fired, label, color) => {
            const norm = Math.max(0, Math.min(1, (voltage + 70) / 110));

            if (fired) {
                ctx.beginPath();
                ctx.arc(x, y, 26, 0, Math.PI * 2);
                ctx.fillStyle = 'rgba(255, 204, 0, 0.15)';
                ctx.fill();
            }

            ctx.beginPath();
            ctx.arc(x, y, 16, 0, Math.PI * 2);
            ctx.fillStyle = fired
                ? '#ffcc00'
                : `rgba(${Math.round(norm*60)}, ${Math.round(norm*180)}, ${Math.round(100 + norm*100)}, 0.9)`;
            ctx.fill();
            ctx.strokeStyle = fired ? '#ffcc00' : color;
            ctx.lineWidth = 1.5;
            ctx.stroke();

            ctx.fillStyle = fired ? '#000' : '#c8d8d0';
            ctx.font = '9px Space Mono, monospace';
            ctx.textAlign = 'center';
            ctx.fillText(label, x, y + 3);
        };

        state.sources.forEach((src, i) => {
            drawNeuron(srcX, spacing * (i+1), src.voltage, src.fired, `S${i+1}`, '#3b9eff');
        });
        state.targets.forEach((trg, i) => {
            drawNeuron(trgX, spacing * (i+1), trg.voltage, trg.fired, `T${i+1}`, '#ff6b35');
        });

        const duration = parseInt(document.getElementById('duration').value);
        document.getElementById('timestamp').textContent = `t = ${state.t} ms`;
        document.getElementById('progress').style.width = `${(state.t / duration) * 100}%`;
    }

    function buildEmptyCharts(duration) {
        charts.forEach(c => c.destroy());
        charts = [];

        const grid = document.getElementById('charts-grid');
        grid.innerHTML = '';


        const allNeurons = [
            ...Array(5).fill(null).map((_, i) => ({ label: `Source ${i+1}`, type: 'source', color: '#3b9eff' })),
            ...Array(5).fill(null).map((_, i) => ({ label: `Target ${i+1}`, type: 'target', color: '#ff6b35' }))
        ];

        // Create two columns
        const sourceCol = document.createElement('div');
        sourceCol.style.cssText = 'display:flex; flex-direction:column; gap:10px;';

        const targetCol = document.createElement('div');
        targetCol.style.cssText = 'display:flex; flex-direction:column; gap:10px;';

        grid.appendChild(sourceCol);
        grid.appendChild(targetCol);

        allNeurons.forEach(({ label, type, color }) => {
            const wrapper = document.createElement('div');
            wrapper.className = `chart-wrapper ${type}`;

            const labelEl = document.createElement('div');
            labelEl.className = 'chart-label';
            labelEl.textContent = label;
            wrapper.appendChild(labelEl);

            const canvas = document.createElement('canvas');
            wrapper.appendChild(canvas);
            if (type === 'source') {
                sourceCol.appendChild(wrapper);
            } else {
                targetCol.appendChild(wrapper);
            }

            const chart = new Chart(canvas, {
                type: 'line',
                data: {
                    labels: [],
                    datasets: [{
                        data: [],
                        borderColor: color,
                        borderWidth: 1,
                        pointRadius: 0,
                        fill: true,
                        backgroundColor: color + '10'
                    }]
                },
                options: {
                    animation: false,
                    plugins: { legend: { display: false } },
                    scales: {
                        y: {
                            min: -90, max: 50,
                            ticks: { color: '#4a6060', font: { size: 9, family: 'Space Mono' }, maxTicksLimit: 4 },
                            grid: { color: 'rgba(0,200,150,0.05)' }
                        },
                        x: {
                            min: 0,
                            max: duration,
                            type: 'linear',
                            ticks: { color: '#4a6060', font: { size: 9, family: 'Space Mono' }, maxTicksLimit: 5 },
                            grid: { color: 'rgba(0,200,150,0.05)' }
                        }
                    }
                }
            });
            charts.push(chart);
        });
    }

    // Build voltage trace charts
    function buildChartsGrid(data) {
        charts.forEach(c => c.destroy());
        charts = [];

        const grid = document.getElementById('charts-grid');
        grid.innerHTML = '';

        const allNeurons = [
            ...data.sources.map((n, i) => ({ neuron: n, label: `Source ${i+1}`, type: 'source', color: '#3b9eff' })),
            ...data.targets.map((n, i) => ({ neuron: n, label: `Target ${i+1}`, type: 'target', color: '#ff6b35' }))
        ];

        allNeurons.forEach(({ neuron, label, type, color }) => {
            const wrapper = document.createElement('div');
            wrapper.className = `chart-wrapper ${type}`;

            const labelEl = document.createElement('div');
            labelEl.className = 'chart-label';
            labelEl.textContent = label + ` · ${neuron.spike_times.length} spikes`;
            wrapper.appendChild(labelEl);

            const canvas = document.createElement('canvas');
            wrapper.appendChild(canvas);
            grid.appendChild(wrapper);

            const chart = new Chart(canvas, {
                type: 'line',
                data: {
                    labels: neuron.times,
                    datasets: [{
                        data: neuron.voltages,
                        borderColor: color,
                        borderWidth: 1,
                        pointRadius: 0,
                        fill: true,
                        backgroundColor: color + '10'
                    }]
                },
                options: {
                    animation: false,
                    plugins: { legend: { display: false } },
                    scales: {
                        y: {
                            min: -90, max: 50,
                            ticks: { color: '#4a6060', font: { size: 9, family: 'Space Mono' }, maxTicksLimit: 4 },
                            grid: { color: 'rgba(0,200,150,0.05)' }
                        },
                        x: {
                            ticks: { color: '#4a6060', font: { size: 9, family: 'Space Mono' }, maxTicksLimit: 5 },
                            grid: { color: 'rgba(0,200,150,0.05)' }
                        }
                    }
                }
            });
            charts.push(chart);
        });

        buildRasterPlot(data);
    }

    // Raster plot
    function buildRasterPlot(data) {
        const wrapper = document.createElement('div');
        wrapper.className = 'chart-wrapper raster';
        wrapper.style.gridColumn = '1 / -1';

        const labelEl = document.createElement('div');
        labelEl.className = 'chart-label';
        labelEl.textContent = 'Raster Plot · All neurons';
        wrapper.appendChild(labelEl);

        const canvas = document.createElement('canvas');
        wrapper.appendChild(canvas);
        document.getElementById('charts-grid').appendChild(wrapper);

        const allNeurons = [
            ...data.sources.map((n, i) => ({ spikes: n.spike_times, label: `S${i+1}`, color: '#3b9eff' })),
            ...data.targets.map((n, i) => ({ spikes: n.spike_times, label: `T${i+1}`, color: '#ff6b35' }))
        ];

        const duration = data.sources[0].times[data.sources[0].times.length - 1];

        const chart = new Chart(canvas, {
            type: 'scatter',
            data: {
                datasets: allNeurons.map((neuron, i) => ({
                    label: neuron.label,
                    data: neuron.spikes.map(t => ({ x: t, y: i })),
                    backgroundColor: neuron.color,
                    pointRadius: 3,
                    pointStyle: 'line',
                    pointBorderWidth: 2,
                    pointBorderColor: neuron.color,
                }))
            },
            options: {
                animation: false,
                plugins: { legend: { display: false } },
                scales: {
                    x: {
                        min: 0, max: duration,
                        title: { display: true, text: 'Time (ms)', color: '#4a6060', font: { size: 9, family: 'Space Mono' } },
                        ticks: { color: '#4a6060', font: { size: 9, family: 'Space Mono' } },
                        grid: { color: 'rgba(0,200,150,0.05)' }
                    },
                    y: {
                        min: -0.5, max: allNeurons.length - 0.5,
                        ticks: {
                            color: '#4a6060',
                            font: { size: 9, family: 'Space Mono' },
                            callback: (val) => allNeurons[Math.round(val)]?.label || ''
                        },
                        grid: { color: 'rgba(0,200,150,0.05)' }
                    }
                }
            }
        });
        charts.push(chart);
    }

    // Update stats
    function updateStats(data) {
        const totalSpikes = [
            ...data.sources.map(n => n.spike_times.length),
            ...data.targets.map(n => n.spike_times.length)
        ].reduce((a, b) => a + b, 0);

        document.getElementById('stat-sources').textContent = data.sources.length;
        document.getElementById('stat-targets').textContent = data.targets.length;
        document.getElementById('stat-synapses').textContent = data.synapses.length;
        document.getElementById('stat-spikes').textContent = totalSpikes;
    }

    // Run button
    document.getElementById('runBtn').addEventListener('click', () => {
        const btn = document.getElementById('runBtn');

        if (currentEvtSource) currentEvtSource.close();

        btn.classList.add('running');
        btn.textContent = '● Simulating...';

        const excitatory = parseFloat(document.getElementById('excitatory').value);
        const inhibitory = parseFloat(document.getElementById('inhibitory').value);
        const weight     = parseFloat(document.getElementById('weight').value);
        const p          = parseFloat(document.getElementById('p').value);
        const duration   = parseInt(document.getElementById('duration').value);

        resetHistory();

        const canvas = document.getElementById('neuron-canvas');
        canvas.width  = canvas.offsetWidth;
        canvas.height = canvas.offsetHeight;

        const params = new URLSearchParams({ excitatory, inhibitory, weight, p, duration });
        buildEmptyCharts(duration);
        currentEvtSource = new EventSource(`http://127.0.0.1:5000/stream?${params}`);

        currentEvtSource.onmessage = (event) => {
            const state = JSON.parse(event.data);

            if (state.synapses) synapses = state.synapses;

            state.sources.forEach((src, i) => {
                voltageHistory.sources[i].push(src.voltage);
                if (src.fired) spikeHistory.sources[i].push(state.t);
            });
            state.targets.forEach((trg, i) => {
                voltageHistory.targets[i].push(trg.voltage);
                if (trg.fired) spikeHistory.targets[i].push(state.t);
            });

            state.sources.forEach((src, i) => {
                charts[i].data.labels.push(state.t);
                charts[i].data.datasets[0].data.push(src.voltage);
                charts[i].update('none'); // 'none' skips animation for performance
            });
            state.targets.forEach((trg, i) => {
                charts[5 + i].data.labels.push(state.t);
                charts[5 + i].data.datasets[0].data.push(trg.voltage);
                charts[5 + i].update('none');
            });

            if (synapses) drawNetwork(state, synapses);

            if (state.t === duration - 1) {
                currentEvtSource.close();
                btn.classList.remove('running');
                btn.textContent = '▶ Run Simulation';

                const chartData = {
                    sources: voltageHistory.sources.map((v, i) => ({
                        times: v.map((_, t) => t),
                        voltages: v,
                        spike_times: spikeHistory.sources[i]
                    })),
                    targets: voltageHistory.targets.map((v, i) => ({
                        times: v.map((_, t) => t),
                        voltages: v,
                        spike_times: spikeHistory.targets[i]
                    })),
                    synapses: synapses
                };

                buildRasterPlot(chartData);
                updateStats(chartData);
            }
        };

        currentEvtSource.onerror = () => {
            btn.classList.remove('running');
            btn.textContent = '▶ Run Simulation';
            currentEvtSource.close();
        };
    });
</script>

</body>
</html>
