<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neuron Simulation</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
</head>
<body>

    <div id="controls">
        <label>Excitatory <input type="range" id="excitatory" min="1" max="10" value="3"></label>
        <label>Inhibitory <input type="range" id="inhibitory" min="0" max="5" value="1"></label>
        <label>Weight <input type="range" id="weight" min="1" max="20" value="5"></label>
        <label>Connectivity <input type="range" id="p" min="0" max="1" step="0.1" value="0.5"></label>
        <button id="runBtn">Run simulation</button>
    </div>

    <div id="main">
        <div id="neuron-panel">
            <canvas id="neuron-canvas" width="400" height="300"></canvas>
        </div>
        <div id="charts-panel">
            <canvas id="source-0"></canvas>
            <canvas id="source-1"></canvas>
            <canvas id="source-2"></canvas>
            <canvas id="source-3"></canvas>
            <canvas id="source-4"></canvas>
            <canvas id="target-0"></canvas>
            <canvas id="target-1"></canvas>
            <canvas id="target-2"></canvas>
            <canvas id="target-3"></canvas>
            <canvas id="target-4"></canvas>
        </div>
    </div>

    <script>
        let charts = [];

        function drawNetwork(data, t) {
            const canvas = document.getElementById('neuron-canvas');
            const ctx = canvas.getContext('2d');
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Draw synapses
            data.synapses.forEach(synapse => {
                const srcX = 80;
                const srcY = 50 + synapse.source * 50;
                const trgX = 320;
                const trgY = 50 + synapse.target * 50;

                // Check if source is currently firing
                const isActive = data.sources[synapse.source].spike_times.includes(t);

                ctx.beginPath();
                ctx.moveTo(srcX + 20, srcY);
                ctx.lineTo(trgX - 20, trgY);
                ctx.strokeStyle = isActive ? 'orange' : 'rgba(150, 150, 150, 0.3)';
                ctx.lineWidth = isActive ? 2 : 0.5;
                ctx.stroke();
            });

            // Draw source neurons
            data.sources.forEach((neuron, i) => {
                const x = 80;
                const y = 50 + i * 50;
                const isFiring = neuron.spike_times.includes(t);
                const voltage = neuron.voltages[t];
                const normalised = Math.max(0, Math.min(1, (voltage + 70) / 110));

                ctx.beginPath();
                ctx.arc(x, y, 20, 0, Math.PI * 2);
                ctx.fillStyle = isFiring ? 'orange' : `rgb(${Math.round(normalised * 100)}, ${Math.round(normalised * 150)}, 200)`;
                ctx.fill();
                ctx.strokeStyle = 'white';
                ctx.lineWidth = 1.5;
                ctx.stroke();

                ctx.fillStyle = 'white';
                ctx.font = '11px sans-serif';
                ctx.textAlign = 'center';
                ctx.fillText(`S${i+1}`, x, y + 4);
            });

            // Draw target neurons
            data.targets.forEach((neuron, i) => {
                const x = 320;
                const y = 50 + i * 50;
                const isFiring = neuron.spike_times.includes(t);
                const voltage = neuron.voltages[t];
                const normalised = Math.max(0, Math.min(1, (voltage + 70) / 110));

                ctx.beginPath();
                ctx.arc(x, y, 20, 0, Math.PI * 2);
                ctx.fillStyle = isFiring ? 'orange' : `rgb(${Math.round(normalised * 100)}, ${Math.round(normalised * 150)}, 200)`;
                ctx.fill();
                ctx.strokeStyle = 'white';
                ctx.lineWidth = 1.5;
                ctx.stroke();

                ctx.fillStyle = 'white';
                ctx.font = '11px sans-serif';
                ctx.textAlign = 'center';
                ctx.fillText(`T${i+1}`, x, y + 4);
            });
        }

        function drawCharts(data) {
            charts.forEach(chart => chart.destroy());
            charts = [];

            data.sources.forEach((neuron, i) => {
                const canvas = document.getElementById(`source-${i}`);
                const chart = new Chart(canvas, {
                    type: 'line',
                    data: {
                        labels: neuron.times,
                        datasets: [{
                            label: `Source ${i+1}`,
                            data: neuron.voltages,
                            borderColor: 'blue',
                            borderWidth: 1,
                            pointRadius: 0
                        }]
                    },
                    options: {
                        animation: false,
                        scales: {
                            y: { min: -90, max: 50 },
                            x: { title: { display: true, text: 'Time (ms)' } }
                        }
                    }
                });
                charts.push(chart);
            });

            data.targets.forEach((neuron, i) => {
                const canvas = document.getElementById(`target-${i}`);
                const chart = new Chart(canvas, {
                    type: 'line',
                    data: {
                        labels: neuron.times,
                        datasets: [{
                            label: `Target ${i+1}`,
                            data: neuron.voltages,
                            borderColor: 'red',
                            borderWidth: 1,
                            pointRadius: 0
                        }]
                    },
                    options: {
                        animation: false,
                        scales: {
                            y: { min: -90, max: 50 },
                            x: { title: { display: true, text: 'Time (ms)' } }
                        }
                    }
                });
                charts.push(chart);
            });
        }

        document.getElementById('runBtn').addEventListener('click', async () => {
            const excitatory = parseFloat(document.getElementById('excitatory').value);
            const inhibitory = parseFloat(document.getElementById('inhibitory').value);
            const weight = parseFloat(document.getElementById('weight').value);
            const p = parseFloat(document.getElementById('p').value);

            const response = await fetch('http://127.0.0.1:5000/simulate', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    excitatory: excitatory,
                    inhibitory: inhibitory,
                    weight: weight,
                    p: p,
                    duration: 200
                })
            });

            const data = await response.json();
            drawCharts(data);
            let currentT = 0;
            function animate() {
                if (currentT < data.sources[0].times.length) {
                    drawNetwork(data, currentT);
                    currentT++;
                    setTimeout(() => requestAnimationFrame(animate), 100);
                }
            }
            currentT = 0;
            animate();
        });
    </script>

</body>
</html>
